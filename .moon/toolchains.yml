# Enable JavaScript (shared settings for bun/node/deno toolchains).
# In moon v2, package manager and JS-wide settings live under `javascript:`.
javascript:
  packageManager: bun

# Enable Bun (proto-pinned via `.prototools`).
bun: {}

# Python is still unstable in moon v2 and is intentionally NOT enabled here.
# `apps/api` declares `language: python` and uses an explicit `uv sync` `build`
# task (see `.moon/tasks/py-api.yml`); toolchain auto-management would clash
# with the existing `.venv` and `pyproject.toml` layout.

# Enable TypeScript. Project-reference auto-sync is OFF because `@luna/ds` and
# `@luna/ui` are source-first packages (consumed via Bun workspace resolution +
# `moduleResolution: bundler`) with `noEmit: true`. TS v6 forbids referencing
# non-emitting projects, so we let the root `tsconfig.json` own references.
typescript:
  syncProjectReferences: false
