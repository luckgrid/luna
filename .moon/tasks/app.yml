inheritedBy:
  language: typescript
  layer: application

fileGroups:
  configs:
    - "*.config.ts"
    - "*.json"
    - ".env*"
  sources:
    - "src/**/*"
  assets:
    - "public/**/*"
    - "**/*.css"

tasks:
  build:
    command: "bun run build"
    inputs:
      - "@group(sources)"
    outputs:
      - ".output"
      - "dist"

  dev:
    command: "bun run dev --port ${WEB_PORT:-3000}"
    options:
      envFile: "/.env.local"
      persistent: true

  optimize:
    command: "bun run optimize"
    options:
      runInCI: false

  preview:
    command: "bun run preview"
    deps:
      - "build"
    preset: "server"

  start:
    command: "bun run start"
    deps:
      - "build"
    options:
      envFile: "/.env.local"
      persistent: true

  clean:
    command: "git"
    args:
      - "clean"
      - "-fdx"
      - "--"
      - ".output"
      - "dist"
      - "node_modules"
