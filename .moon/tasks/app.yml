inheritedBy:
  language: typescript
  layer: application

fileGroups:
  configs:
    - "*.config.ts"
    - "*.json"
  sources:
    - "src/**/*"
  assets:
    - "public/**/*"
    - "**/*.css"

tasks:
  build:
    command: "bun run build"
    inputs:
      - "@group(sources)"
    outputs:
      - ".output"
      - "dist"

  dev:
    command: "bun run dev"
    preset: "server"
    options:
      persistent: true

  optimize:
    command: "bun run optimize"
    options:
      runInCI: false

  preview:
    command: "bun run preview"
    deps:
      - "build"
    preset: "server"

  start:
    command: "bun run start"
    deps:
      - "build"
    preset: "server"
    options:
      persistent: true
