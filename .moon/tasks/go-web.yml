inheritedBy:
  language: go
  layer: application
  stack: frontend

fileGroups:
  configs:
    - "go.mod"
    - "go.sum"
    - "*.yml"
  sources:
    - "main.go"
    - "src/**/*"
  assets:
    - "public/**/*"
    - "**/*.css"

tasks:
  # Go module prefetch; root `bun run install` runs this with `api:build` after proto + Bun.
  install:
    command: "go"
    args: ["mod", "download"]
    inputs:
      - "go.mod"
      - "go.sum"

  templates:
    command: "go"
    args: ["tool", "templ", "generate"]
    deps:
      - "install"
    inputs:
      - "src/**/*.templ"
    outputs:
      - "src/**/*_templ.go"

  styles:
    command: "bunx"
    args:
      - "@tailwindcss/cli"
      - "-i"
      - "src/styles.css"
      - "-o"
      - "dist/styles.css"
      - "--minify"
    inputs:
      - "src/**/*.css"
      - "src/**/*.templ"
      - "src/**/*_templ.go"
      - "main.go"
      - "/packages/ds/**/*.css"
    outputs:
      - "dist/styles.css"

  build:
    command: "go"
    args: ["run", "."]
    deps:
      - "templates"
      - "styles"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    outputs:
      - "dist"

  dev:
    command: "go"
    args:
      - "tool"
      - "templ"
      - "generate"
      - "--watch"
      - "--open-browser=false"
      - "--proxy=http://localhost:${WEB_PORT:-3000}"
      - "--cmd"
      - "go run . --serve --port ${WEB_PORT:-3000}"
    deps:
      - "build"
    options:
      envFile: "/.env.local"
      persistent: true
      runInCI: false

  lint:
    command: "go"
    args: ["vet", "./..."]
    deps:
      - "build"
    inputs:
      - "@group(sources)"
      - "main.go"

  lint-fix:
    command: "go"
    args: ["fmt", "./..."]
    deps:
      - "build"
    inputs:
      - "@group(sources)"
      - "main.go"

  format:
    command: "go"
    args: ["fmt", "./..."]
    deps:
      - "build"
    inputs:
      - "@group(sources)"
      - "main.go"

  format-check:
    command: sh
    args:
      - "-c"
      - "if gofmt -l -e main.go src | grep -q .; then echo 'Files need gofmt:'; gofmt -l -e main.go src; exit 1; fi"
    deps:
      - "build"
    inputs:
      - "@group(sources)"
      - "main.go"

  clean:
    command: "git"
    args:
      - "clean"
      - "-fdx"
      - "--"
      - "dist"
      - ":(glob)src/**/*_templ.go"
